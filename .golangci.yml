run:
  timeout: 5m
  tests: true

linters:
  disable-all: false
  enable:
    - govet
    - staticcheck
    - errcheck
    - gofmt
    - goimports
    - gosimple
    - unused
    - ineffassign
    - typecheck
    - bodyclose

issues:
  exclude-use-default: false
  # directories to exclude from issue reporting (replacement for deprecated run.skip-dirs)
  exclude-dirs:
    - ^tools$
    - ^examples$
    - ^bench-output$
    - ^cmd/flow-worker$
    - ^cmd/flow-assets$
    - ^examples/.*$
  exclude-rules:
    - linters:
        - errcheck
      # ignore errcheck findings that match these simple function names
      text: "Close"
    - linters:
        - errcheck
      text: "Write"
    - linters:
        - errcheck
      text: "Flush"

linters-settings: {}

exclude:
  - _gen.go