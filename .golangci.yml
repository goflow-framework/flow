version: "2"
run:
  tests: true
linters:
  enable:
    - bodyclose
    - staticcheck
  disable:
    # staticcheck is enabled above; keep other disables here as needed
  exclusions:
    generated: lax
    rules:
      - linters:
          - errcheck
        text: Close
      - linters:
          - errcheck
        text: Write
      - linters:
          - errcheck
        text: Flush
      - path: (.+)\.go$
        text: _gen.go%
    paths:
      - ^tools($|/)
      - ^examples($|/)
      - ^bench-output($|/)
      - ^cmd/flow-worker($|/)
      - ^cmd/flow-assets($|/)
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - ^tools($|/)
      - ^examples($|/)
      - ^bench-output($|/)
      - ^cmd/flow-worker($|/)
      - ^cmd/flow-assets($|/)
      - third_party$
      - builtin$
      - examples$
