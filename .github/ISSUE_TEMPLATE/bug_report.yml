name: Bug Report
description: Report a reproducible bug in Flow
title: "bug: <short description>"
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: "When I call X with Y, I get Z instead of W."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: >
        Provide the smallest possible Go snippet or repository link that reproduces the issue.
        Wrap code in triple backticks.
      placeholder: |
        ```go
        // paste here
        ```
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include any error messages or stack traces.
    validations:
      required: true

  - type: input
    id: flow_version
    attributes:
      label: Flow version / commit
      description: Output of `git rev-parse --short HEAD` or the module version you are using.
      placeholder: "e.g. fa336a7 or v0.9.1"
    validations:
      required: true

  - type: input
    id: go_version
    attributes:
      label: Go version
      description: Output of `go version`
      placeholder: "e.g. go1.25.0 linux/amd64"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "e.g. Ubuntu 22.04, macOS 14, Windows 11 + WSL2"
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Logs, screenshots, related issues — anything else that may help.
