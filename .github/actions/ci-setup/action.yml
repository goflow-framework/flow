name: "ci-setup-go"
description: "Small reusable action to set up Go (wraps actions/setup-go) and ensure GOPATH/bin is on PATH"
inputs:
  go-version:
    description: "Go version to install (ex: '1.24.13' or '1.24.x')"
    required: false
    default: "1.24.13"
  gomodcache:
    description: "Optional workspace-local GOMODCACHE path to set (ex: /path/to/repo/.gomodcache)"
    required: false
    default: ""
  goproxy:
    description: "Optional GOPROXY value to set (ex: https://proxy.golang.org,direct)"
    required: false
    default: ""
  gosumdb:
    description: "Optional GOSUMDB value to set (ex: sum.golang.org)"
    required: false
    default: ""
runs:
  using: "composite"
  steps:
    - name: Setup Go toolchain
      uses: actions/setup-go@v4
      with:
        go-version: ${{ inputs.go-version }}
        cache: 'true'

    - name: Add GOPATH/bin to PATH
      shell: bash
      run: |
        # Ensure GOPATH is present and add GOPATH/bin to PATH for subsequent steps
        GOPATH="$(go env GOPATH)"
        if [ -n "$GOPATH" ]; then
          echo "GOPATH is $GOPATH"
          echo "${GOPATH}/bin" >> $GITHUB_PATH
        fi
    - name: Configure Go environment (optional)
      shell: bash
      run: |
        if [ -n "${{ inputs.gomodcache }}" ]; then
          echo "Setting GOMODCACHE=${{ inputs.gomodcache }}"
          go env -w GOMODCACHE='${{ inputs.gomodcache }}'
        fi
        if [ -n "${{ inputs.goproxy }}" ]; then
          echo "Setting GOPROXY=${{ inputs.goproxy }}"
          go env -w GOPROXY='${{ inputs.goproxy }}'
        fi
        if [ -n "${{ inputs.gosumdb }}" ]; then
          echo "Setting GOSUMDB=${{ inputs.gosumdb }}"
          go env -w GOSUMDB='${{ inputs.gosumdb }}'
        fi