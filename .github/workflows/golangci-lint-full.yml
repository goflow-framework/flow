name: golangci-lint-full

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  build-and-run-linters:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.24'
      - name: Print go env
        run: |
          go version
          go env
      - name: Prepare module cache
        run: |
          # Create an isolated module cache under the runner temp dir and export
          # it for subsequent steps. Writing to GITHUB_ENV takes effect only in
          # subsequent steps, so use RUNNER_TEMP directly to make the directory
          # in this step, then export the variable for later steps.
          mkdir -p "$RUNNER_TEMP/gomodcache"
          echo "GOMODCACHE=$RUNNER_TEMP/gomodcache" >> "$GITHUB_ENV"
          # Clean any global caches and download modules into the isolated cache
          go clean -cache -modcache || true
          go env GOMODCACHE
          go mod download
      - name: Build golangci-lint with local Go
        run: |
          GOBIN=$(go env GOPATH)/bin
          mkdir -p "$GOBIN"
          # build/install golangci-lint with the runner's Go to ensure analyzer
          # and toolchain versions are compatible
          GOBIN="$GOBIN" go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.59.0
      - name: Run golangci-lint (full set)
        run: |
          export GOFLAGS='-mod=mod'
          $(go env GOPATH)/bin/golangci-lint run --config .golangci.yml ./pkg/... ./internal/...
