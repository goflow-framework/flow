name: golangci-lint-full

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  build-and-run-linters:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.24'
      - name: Print go env
        run: |
          go version
          go env
      - name: Prepare module & go caches (no download)
        run: |
          # Create isolated module and go caches under the runner temp dir.
          # IMPORTANT: do NOT download modules on the runner. Downloading
          # modules here can create cached export data compiled by the
          # runner's Go toolchain and lead to export-data/version
          # mismatches when the linter runs inside the container. We'll
          # perform `go mod download` inside the container where the
          # linter is built and executed.
          mkdir -p "$RUNNER_TEMP/gomodcache"
          mkdir -p "$RUNNER_TEMP/gocache"
          echo "GOMODCACHE=$RUNNER_TEMP/gomodcache" >> "$GITHUB_ENV"
          echo "GOCACHE=$RUNNER_TEMP/gocache" >> "$GITHUB_ENV"
      - name: Run golangci-lint inside a Go 1.24 container
        run: |
          export GOFLAGS='-mod=mod'
          # Use an official Go container so we can download modules and build
          # the golangci-lint binary inside the same Go toolchain that will
          # be used for analysis. This avoids export-data/version mismatches.
          docker run --rm \
              -v "$PWD":/app -w /app \
              golang:1.24.11 \
              /bin/sh -lc "set -euo pipefail; export PATH=/usr/local/go/bin:/go/bin:$PATH; /usr/local/go/bin/go version; /usr/local/go/bin/go env; \
                # Use container-local caches to avoid bind-mount and cross-device cache issues
                mkdir -p /tmp/gomodcache /tmp/gocache; \
                GOMODCACHE=/tmp/gomodcache GOCACHE=/tmp/gocache /usr/local/go/bin/go clean -cache -modcache -testcache -i || true; \
                GOMODCACHE=/tmp/gomodcache GOCACHE=/tmp/gocache /usr/local/go/bin/go mod download; \
                echo '\n--- Running diagnostics: go list and go vet (show errors if any) ---\n'; \
                GOMODCACHE=/tmp/gomodcache GOCACHE=/tmp/gocache /usr/local/go/bin/go list ./pkg/... ./internal/... || (echo 'go list failed' && exit 2); \
                # Optionally run go vet to surface type-check issues earlier
                GOMODCACHE=/tmp/gomodcache GOCACHE=/tmp/gocache /usr/local/go/bin/go vet ./pkg/... ./internal/... || true; \
                GOBIN="/go/bin" /usr/local/go/bin/go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.59.0; \
                echo '\n--- Diagnostic: go env (json) ---\n'; /usr/local/go/bin/go env -json || true; \
                echo '\n--- Diagnostic: go list sync/atomic ---\n'; /usr/local/go/bin/go list -json sync/atomic || true; \
                echo '\n--- Diagnostic: list some files in container GOMODCACHE (/tmp/gomodcache) ---\n'; ls -la /tmp/gomodcache | head -n 50 || true; \
                echo '\n--- Diagnostic: list compiled stdlib packages (GOROOT/pkg) ---\n'; ls -la /usr/local/go/pkg || true; \
                echo '\n--- Diagnostic: list compiled stdlib arch packages (GOROOT/pkg/linux_amd64) ---\n'; ls -la /usr/local/go/pkg/linux_amd64 || true; \
                echo '\n--- Diagnostic: find any sync/atomic related files in container caches ---\n'; find /tmp/gomodcache /tmp/gocache /usr/local/go/pkg -type f -name '*sync*' -maxdepth 5 -print || true; \
                 # Diagnostic invocations for typecheck/staticcheck removed to avoid
                 # noisy analyzer runs during PRs; use the `collect-export-diagnostics`
                 # job to capture export metadata for debugging.
                echo '\n--- Running golangci-lint (verbose) ---\n'; /go/bin/golangci-lint run --verbose --config .golangci.yml --disable staticcheck --disable typecheck ./pkg/... ./internal/..."
  collect-export-diagnostics:
    name: Collect golang export-data diagnostics
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create export dir
        run: |
          mkdir -p ./ci-export
      - name: Run export diagnostics in Go container
        run: |
          echo 'Running export diagnostics inside golang:1.24.11 container';
          docker run --rm -v "$PWD":/app -w /app golang:1.24.11 /bin/sh -lc "set -euo pipefail; mkdir -p /tmp/gomodcache /tmp/gocache; \
            GOMODCACHE=/tmp/gomodcache GOCACHE=/tmp/gocache /usr/local/go/bin/go mod download; \
            # collect dependency export list for all packages
            GOMODCACHE=/tmp/gomodcache GOCACHE=/tmp/gocache /usr/local/go/bin/go list -deps -json ./... > /app/ci-export/deps.json || true; \
            echo '--- goroot pkg listing ---' > /app/ci-export/goroot_pkg.txt; ls -la /usr/local/go/pkg >> /app/ci-export/goroot_pkg.txt || true; \
            echo '--- module cache top entries ---' > /app/ci-export/modcache_list.txt; ls -la /tmp/gomodcache | head -n 200 >> /app/ci-export/modcache_list.txt || true; \
            echo '--- find .a (archive) files and potential export files ---' > /app/ci-export/exports_find.txt; find /tmp/gomodcache /tmp/gocache /usr/local/go/pkg -type f \( -name '*.a' -o -iname '*export*' \) -maxdepth 6 -print >> /app/ci-export/exports_find.txt || true; \
            # small sanity outputs
            /usr/local/go/bin/go env -json > /app/ci-export/go_env.json || true; \
            /usr/local/go/bin/go list -json sync/atomic > /app/ci-export/sync_atomic.json || true; "
      - name: Archive diagnostic outputs
        run: |
          tar -czf ci-export.tar.gz ci-export || true
      - name: Upload diagnostics artifact
        uses: actions/upload-artifact@v4
        with:
          name: golangci-export-diagnostics
          path: ci-export.tar.gz
