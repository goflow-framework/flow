name: golangci-lint

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: ./.github/actions/ci-setup
        with:
          go-version: 1.24.11
      - name: Cache Go modules and golangci state
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/.cache/golangci-lint
            ${{ github.workspace }}/.gomodcache
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Ensure modules downloaded
        run: |
          # Configure a workspace-local GOMODCACHE so runs are hermetic and
          # caching is effective.
          go env -w GOMODCACHE=${{ github.workspace }}/.gomodcache
          go env
          go mod download

      - name: Install golangci-lint v2.9.0
        run: |
          curl -sSfL https://github.com/golangci/golangci-lint/releases/download/v2.9.0/golangci-lint-2.9.0-linux-amd64.tar.gz -o /tmp/golangci.tar.gz
          tar -xzf /tmp/golangci.tar.gz -C $HOME
          ls -la $HOME/golangci-lint-2.9.0-linux-amd64

      - name: Run golangci-lint (manual)
        run: |
          # Run the pinned v2 binary without forcing an output format to avoid
          # unknown-flag errors across different releases.
          $HOME/golangci-lint-2.9.0-linux-amd64/golangci-lint run --timeout=10m

      - name: Upload golangci-lint cache (optional)
        if: always()
        run: echo "lint complete"