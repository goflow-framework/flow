name: golangci-lint-full

permissions:
  packages: write

on:
  pull_request:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build-and-run-linters:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.24'
      - name: Print go env
        run: |
          go version
          go env
      - name: Prepare module & go caches (no download)
        run: |
          # Create isolated module and go caches under the runner temp dir.
          # IMPORTANT: do NOT download modules on the runner. Downloading
          # modules here can create cached export data compiled by the
          # runner's Go toolchain and lead to export-data/version
          # mismatches when the linter runs inside the container. We'll
          # perform `go mod download` inside the container where the
          # linter is built and executed.
          mkdir -p "$RUNNER_TEMP/gomodcache"
          mkdir -p "$RUNNER_TEMP/gocache"
          echo "GOMODCACHE=$RUNNER_TEMP/gomodcache" >> "$GITHUB_ENV"
          echo "GOCACHE=$RUNNER_TEMP/gocache" >> "$GITHUB_ENV"
      - name: Run golangci-lint inside a Go 1.24 container
        run: |
          export GOFLAGS='-mod=mod'
          # create a helper script inside the repo (mounted into the container) to
          # avoid nested quoting/escaping issues when running many commands inside
          # a docker container. This avoids accidental injection of following
          # YAML job names as shell commands (the "command not found" we saw).
          cat > .github/workflows/_run_golangci.sh <<'SH'
          #!/bin/sh
          set -euo pipefail
          export PATH=/usr/local/go/bin:/go/bin:$PATH
          export GOFLAGS='-mod=mod -buildvcs=false'
          /usr/local/go/bin/go version
          /usr/local/go/bin/go env
          # Use container-local caches to avoid bind-mount and cross-device cache issues
          mkdir -p /tmp/gomodcache /tmp/gocache
          GOMODCACHE=/tmp/gomodcache GOCACHE=/tmp/gocache /usr/local/go/bin/go clean -cache -modcache -testcache -i || true
          # NOTE: avoid running `go list`/`go vet` on the runner -- run them inside the
          # container to ensure the same toolchain and working directory are used.
          echo '\n--- Skipping runner-side go list/go vet (will execute inside container when needed) ---\n'
          # Install prebuilt golangci-lint binary (v1.59.0) to avoid running `go install` (faster and deterministic)
          echo '\n--- Installing golangci-lint binary (v1.59.0) ---\n'
          curl -sSfL https://github.com/golangci/golangci-lint/releases/download/v1.59.0/golangci-lint-1.59.0-linux-amd64.tar.gz | tar -xz -C /tmp || (echo 'failed to download golangci-lint binary' && exit 2)
          mv /tmp/golangci-lint-1.59.0-linux-amd64/golangci-lint /usr/local/bin/golangci-lint
          chmod +x /usr/local/bin/golangci-lint
          echo '\n--- Diagnostic: go env (json) ---\n'
          /usr/local/go/bin/go env -json || true
          echo '\n--- Diagnostic: go list sync/atomic ---\n'
          /usr/local/go/bin/go list -json sync/atomic || true
          echo '\n--- Diagnostic: list some files in container GOMODCACHE (/tmp/gomodcache) ---\n'
          ls -la /tmp/gomodcache | head -n 200 || true
          echo '\n--- Diagnostic: list compiled stdlib packages (GOROOT/pkg) ---\n'
          ls -la /usr/local/go/pkg || true
          echo '\n--- Diagnostic: list compiled stdlib arch packages (GOROOT/pkg/linux_amd64) ---\n'
          ls -la /usr/local/go/pkg/linux_amd64 || true
          echo '\n--- Diagnostic: find any sync/atomic related files in container caches ---\n'
          find /tmp/gomodcache /tmp/gocache /usr/local/go/pkg -type f -name '*sync*' -maxdepth 6 -print || true
          # Diagnostic invocations for typecheck/staticcheck removed to avoid
          # noisy analyzer runs during PRs; use the `collect-export-diagnostics`
          # job to capture export metadata for debugging.
          echo '\n--- Running standalone whitelist checks: gofmt, goimports, errcheck ---\n'
          # run gofmt check (fail on any files listed)
          /usr/local/go/bin/gofmt -l . > /tmp/gofmt_out || true
          if [ -s /tmp/gofmt_out ]; then echo 'gofmt found files that need formatting:'; cat /tmp/gofmt_out; exit 1; fi
          # install and run goimports
          GOBIN=/go/bin /usr/local/go/bin/go install golang.org/x/tools/cmd/goimports@latest
          /go/bin/goimports -l . > /tmp/goimports_out || true
          if [ -s /tmp/goimports_out ]; then echo 'goimports found files that need fixes:'; cat /tmp/goimports_out; exit 1; fi
          # install and run errcheck
          GOBIN=/go/bin /usr/local/go/bin/go install github.com/kisielk/errcheck@latest
          /go/bin/errcheck ./... || (echo 'errcheck found issues' && exit 1)
          echo '\n--- Running golangci-lint (preserve-more, but disable govet/typecheck/staticcheck) ---\n'
          /go/bin/golangci-lint run --verbose --config .golangci.yml --disable govet --disable typecheck --disable staticcheck ./pkg/... ./internal/... || true
          chmod +x .github/workflows/_run_golangci.sh || true
          # Run the helper script inside the golang container (script lives under /app)
          docker run --rm -v "$GITHUB_WORKSPACE":/app -w /app golang:1.24.11 /bin/sh -c "/app/.github/workflows/_run_golangci.sh"

  # Build a pinned analyzer container image (golang:1.24.11 + golangci-lint v1.59.0)
  build-analyzer-image:
    name: Build analyzer image
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.set-tag.outputs.image-tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Set image tag
        id: set-tag
        run: |
          # Tag the image with the GHCR repo + commit sha so it can be referenced
          echo "image-tag=ghcr.io/${{ github.repository_owner }}/golangci-analyzer:1.24.11-1.59.0-${{ github.sha }}" >> "$GITHUB_OUTPUT"
      - name: Log in to GHCR (try GHCR_PAT then fallback to GITHUB_TOKEN)
        run: |
          set -euxo pipefail
          echo "Attempting to login to ghcr.io"
          # If GHCR_PAT is provided, try it first. If it fails, try GITHUB_TOKEN.
          if [ -n "${{ secrets.GHCR_PAT }}" ]; then
            echo "GHCR_PAT present — attempting login with GHCR_PAT"
            if echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin; then
              echo "Logged in to ghcr.io with GHCR_PAT"
            else
              echo "GHCR_PAT login failed — attempting login with GITHUB_TOKEN"
              echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            fi
          else
            echo "GHCR_PAT not set — using GITHUB_TOKEN"
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          fi

      - name: Build and push analyzer image to GHCR
        run: |
          docker build --pull -t "${{ steps.set-tag.outputs.image-tag }}" .github/containers/golangci-analyzer
          docker images | grep golangci-analyzer || true
          docker push "${{ steps.set-tag.outputs.image-tag }}"

      - name: Debug:- show built images and inspect tag
        if: always()
        run: |
          echo "== docker images (machine-readable) =="
          docker images --format '{{.Repository}}:{{.Tag}}\t{{.ID}}' | grep golangci-analyzer || true
          echo "\n== inspect expected image tag =="
          docker image inspect "${{ steps.set-tag.outputs.image-tag }}" || true
          echo "\n== docker info =="
          docker info || true

  # Gated rollout: run type-aware 'typecheck' first in a non-blocking job.
  # If the non-blocking run completes successfully, the blocking job below
  # will run and enforce failures. This allows a safe staged rollout.
  typecheck-nonblocking:
    name: Typecheck (non-blocking rollout)
    needs: build-analyzer-image
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.build-analyzer-image.outputs.image-tag }}
    continue-on-error: true
    outputs:
      has_issues: ${{ steps.check.outputs.has_issues }}
    steps:
      - uses: actions/checkout@v4
      - name: Create export dir
        run: |
          mkdir -p ./ci-export-typecheck
      - name: Debug:dump workspace and git info
        run: |
          # Capture working directory and listing to help debug 'no go files to analyze'
          echo "PWD: $(pwd)" > ./ci-export-typecheck/pwd.txt || true
          echo "Listing root:" > ./ci-export-typecheck/ls_root.txt || true
          ls -la >> ./ci-export-typecheck/ls_root.txt 2>&1 || true
          echo "Listing .github:" > ./ci-export-typecheck/ls_github.txt || true
          ls -la .github >> ./ci-export-typecheck/ls_github.txt 2>&1 || true
          echo "Git top-level:" > ./ci-export-typecheck/git_top.txt || true
          git rev-parse --show-toplevel >> ./ci-export-typecheck/git_top.txt 2>&1 || true
          echo "Git status:" > ./ci-export-typecheck/git_status.txt || true
          git status --porcelain >> ./ci-export-typecheck/git_status.txt 2>&1 || true
          echo "Files matching go pattern:" > ./ci-export-typecheck/go_files.txt || true
          find . -type f -name '*.go' | head -n 200 >> ./ci-export-typecheck/go_files.txt 2>&1 || true
      - name: Run typecheck inside pinned analyzer container (non-blocking)
        run: |
          if [ -f .github/scripts/run-golangci-in-container.sh ]; then
            # Preflight: record .github/scripts listing and helper script stat so
            # we can debug missing-file cases in the exported diagnostics.
            mkdir -p ./ci-export-typecheck || true
            echo "Preflight: ls .github/scripts" > ./ci-export-typecheck/ls_dot_github_scripts.txt || true
            ls -la .github/scripts >> ./ci-export-typecheck/ls_dot_github_scripts.txt 2>&1 || true
            if [ -f .github/scripts/run-golangci-in-container.sh ]; then
              stat -c '%a %U %G %n' .github/scripts/run-golangci-in-container.sh > ./ci-export-typecheck/run_helper_stat.txt 2>&1 || true
            else
              echo "not found" > ./ci-export-typecheck/run_helper_stat.txt || true
            fi

            chmod +x .github/scripts/run-golangci-in-container.sh || true
            # Write an immediate marker into the workspace-mounted export dir so the runner log shows activity
            printf "%s\n" "container-entered: $(date -u)" > ./ci-export-typecheck/container_started.txt || true
            command -v bash > ./ci-export-typecheck/bash_present.txt 2>&1 || true
            ls -la ./ci-export-typecheck > ./ci-export-typecheck/ls_container_export.txt 2>&1 || true
            CI_EXPORT_DIR=./ci-export-typecheck /bin/bash .github/scripts/run-golangci-in-container.sh _nonblocking > ./ci-export-typecheck/helper_stdout.txt 2> ./ci-export-typecheck/helper_stderr.txt || echo "$?" > ./ci-export-typecheck/helper_exit_code
          else
            echo "helper script not found" > ./ci-export-typecheck/golangci_typecheck.out || true
            echo 2 > ./ci-export-typecheck/golangci_exit_code || true
          fi
      - name: Archive typecheck diagnostic outputs
        if: always()
        run: |
          # Ensure the export dir exists and contains at least a placeholder
          mkdir -p ci-export-typecheck
          if [ -z "$(ls -A ci-export-typecheck 2>/dev/null)" ]; then
            echo "no diagnostics produced; placeholder created" > ci-export-typecheck/golangci_typecheck.out || true
          fi
          tar -czf ci-export-typecheck.tar.gz ci-export-typecheck || true
      - name: Upload typecheck diagnostics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: golangci-typecheck-diagnostics
          path: ci-export-typecheck.tar.gz
      - name: Summarize golangci output and post to PR
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = './ci-export-typecheck/golangci_typecheck.out';
            let body = '### golangci-lint (typecheck) summary\n\n';
            try {
              const out = fs.readFileSync(path, 'utf8');
              const totalLines = out.split(/\r?\n/).length;
              const head = out.split(/\r?\n/).slice(0,200).join('\n');
              const exitcode = fs.existsSync('./ci-export-typecheck/golangci_exit_code') ? fs.readFileSync('./ci-export-typecheck/golangci_exit_code','utf8').trim() : 'n/a';
              body += `Exit code: ${exitcode}\n\nTotal lines: ${totalLines}\n\n\`\`\`\n${head}\n\`\`\``;
            } catch (e) {
              body += 'No golangci output found in ci-export-typecheck/golangci_typecheck.out';
            }
            // post a comment to the PR (use github.rest to access the REST API)
            const pr = context.payload.pull_request;
            if (!pr) {
              console.log('No pull_request payload available; skipping comment');
            } else {
              // Always write the summary file so it is uploaded with diagnostics.
              const summaryPath = './ci-export-typecheck/golangci_pr_summary.md';
              try {
                fs.writeFileSync(summaryPath, body);
                console.log(`Wrote summary to ${summaryPath}`);
              } catch (e) {
                console.log('Failed to write summary file:', e.message);
              }

              // Try to post a comment; if this is a forked PR the token may lack
              // permission and the REST call will return 403. Catch errors and
              // continue so the job doesn't fail.
              try {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  body,
                });
                console.log('Posted golangci summary comment to PR');
              } catch (err) {
                console.log('Skipping POST to GitHub API (may be a fork or permission issue):', err.message);
              }
            }
      - id: check
        name: Determine if typecheck produced issues
        run: |
          # Read the exit code produced by the docker run. Non-zero means golangci-lint found issues
          # (or the container failed). Default to 'true' (has issues) if we can't read the code.
          if [ -f ci-export-typecheck/golangci_exit_code ]; then
            exitcode=$(cat ci-export-typecheck/golangci_exit_code)
          else
            exitcode=1
          fi
          if [ "$exitcode" -ne 0 ]; then
            echo "has_issues=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_issues=false" >> "$GITHUB_OUTPUT"
          fi

  # Blocking job that will only run if the non-blocking run succeeded.
  typecheck-blocking:
    name: Typecheck (blocking, gated)
    needs: [build-analyzer-image, typecheck-nonblocking]
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.build-analyzer-image.outputs.image-tag }}
    if: needs.typecheck-nonblocking.outputs.has_issues == 'false'
    steps:
      - uses: actions/checkout@v4
      - name: Run blocking typecheck inside analyzer container
        run: |
          # Invoke helper script via sh to avoid chmod issues on container mounts
          if [ -f .github/scripts/run-golangci-in-container.sh ]; then
            mkdir -p ./ci-export-typecheck || true
            echo "Preflight: ls .github/scripts" > ./ci-export-typecheck/ls_dot_github_scripts.txt || true
            ls -la .github/scripts >> ./ci-export_typecheck/ls_dot_github_scripts.txt 2>&1 || true
            if [ -f .github/scripts/run-golangci-in-container.sh ]; then
              stat -c '%a %U %G %n' .github/scripts/run-golangci-in-container.sh > ./ci-export-typecheck/run_helper_stat.txt 2>&1 || true
            else
              echo "not found" > ./ci-export-typecheck/run_helper_stat.txt || true
            fi
            chmod +x .github/scripts/run-golangci-in-container.sh || true
            printf "%s\n" "container-entered: $(date -u)" > ./ci-export-typecheck/container_started.txt || true
            command -v bash > ./ci-export-typecheck/bash_present.txt 2>&1 || true
            ls -la ./ci-export-typecheck > ./ci-export-typecheck/ls_container_export.txt 2>&1 || true
            CI_EXPORT_DIR=./ci-export-typecheck /bin/bash .github/scripts/run-golangci-in-container.sh _blocking > ./ci-export-typecheck/helper_stdout.txt 2> ./ci-export-typecheck/helper_stderr.txt || echo "$?" > ./ci-export-typecheck/helper_exit_code
          else
            echo "helper script not found" > ./ci-export-typecheck/golangci_typecheck_blocking.out || true
            echo 2 > ./ci-export-typecheck/golangci_exit_code_blocking || true
          fi

  # Temporary debug job: always run blocking diagnostics regardless of gate.
  # Use this to collect blocking outputs when the gated job is skipped.
  typecheck-blocking-debug:
    name: Typecheck (blocking, debug - always run)
    needs: [build-analyzer-image, typecheck-nonblocking]
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.build-analyzer-image.outputs.image-tag }}
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Create export dir (debug)
        run: |
          mkdir -p ./ci-export-typecheck
      - name: Run blocking typecheck (debug) inside analyzer container
        run: |
          if [ -f .github/scripts/run-golangci-in-container.sh ]; then
            mkdir -p ./ci-export-typecheck || true
            echo "Preflight: ls .github/scripts" > ./ci-export-typecheck/ls_dot_github_scripts.txt || true
            ls -la .github/scripts >> ./ci-export-typecheck/ls_dot_github_scripts.txt 2>&1 || true
            if [ -f .github/scripts/run-golangci-in-container.sh ]; then
              stat -c '%a %U %G %n' .github/scripts/run-golangci-in-container.sh > ./ci-export-typecheck/run_helper_stat.txt 2>&1 || true
            else
              echo "not found" > ./ci-export-typecheck/run_helper_stat.txt || true
            fi

            chmod +x .github/scripts/run-golangci-in-container.sh || true
            printf "%s\n" "container-entered: $(date -u)" > ./ci-export-typecheck/container_started.txt || true
            CI_EXPORT_DIR=./ci-export-typecheck /bin/bash .github/scripts/run-golangci-in-container.sh _blocking_debug > ./ci-export-typecheck/helper_stdout.txt 2> ./ci-export-typecheck/helper_stderr.txt || echo "$?" > ./ci-export_typecheck/helper_exit_code
          else
            echo "helper script not found" > ./ci-export-typecheck/golangci_typecheck_blocking_debug.out || true
            echo 2 > ./ci-export-typecheck/golangci_exit_code_blocking_debug || true
          fi
      - name: Archive debug diagnostic outputs
        if: always()
        run: |
          mkdir -p ci-export-typecheck
          tar -czf ci-export-typecheck-blocking-debug.tar.gz ci-export-typecheck || true
      - name: Upload debug diagnostics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: golangci-typecheck-diagnostics-blocking-debug
          path: ci-export-typecheck-blocking-debug.tar.gz

  # Forced blocking job: run the blocking typecheck regardless of the gate.
  # This is temporary and intended to collect full blocking diagnostics for debugging only.
  typecheck-blocking-force:
    name: Typecheck (blocking, forced - debug)
    needs: [build-analyzer-image, typecheck-nonblocking]
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.build-analyzer-image.outputs.image-tag }}
    env:
      ULTRA_AGGRESSIVE_CLEAN: '1'
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Create export dir (blocking-force)
        run: |
          mkdir -p ./ci-export-typecheck
      - name: Run blocking typecheck (force) inside analyzer container
        run: |
          if [ -f .github/scripts/run-golangci-in-container.sh ]; then
            mkdir -p ./ci-export-typecheck || true
            echo "Preflight: ls .github/scripts" > ./ci-export-typecheck/ls_dot_github_scripts.txt || true
            ls -la .github/scripts >> ./ci-export_typecheck/ls_dot_github_scripts.txt 2>&1 || true
            if [ -f .github/scripts/run-golangci-in-container.sh ]; then
              stat -c '%a %U %G %n' .github/scripts/run-golangci-in-container.sh > ./ci-export-typecheck/run_helper_stat.txt 2>&1 || true
            else
              echo "not found" > ./ci-export-typecheck/run_helper_stat.txt || true
            fi

            chmod +x .github/scripts/run-golangci-in-container.sh || true
            printf "%s\n" "container-entered: $(date -u)" > ./ci-export-typecheck/container_started.txt || true
            CI_EXPORT_DIR=./ci-export-typecheck ULTRA_AGGRESSIVE_CLEAN=1 /bin/bash .github/scripts/run-golangci-in-container.sh _blocking_force > ./ci-export-typecheck/helper_stdout.txt 2> ./ci-export-typecheck/helper_stderr.txt || echo "$?" > ./ci-export-typecheck/helper_exit_code
          else
            echo "helper script not found" > ./ci-export-typecheck/golangci_typecheck_blocking_force.out || true
            echo 2 > ./ci-export-typecheck/golangci_exit_code_blocking_force || true
          fi
