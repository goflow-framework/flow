name: golangci-lint-full

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  build-and-run-linters:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.24'
      - name: Print go env
        run: |
          go version
          go env
      - name: Prepare module & go caches
        run: |
          # Create isolated module and go caches under the runner temp dir
          mkdir -p "$RUNNER_TEMP/gomodcache"
          mkdir -p "$RUNNER_TEMP/gocache"
          # Export them for later steps (writing to GITHUB_ENV makes them
          # available in subsequent steps)
          echo "GOMODCACHE=$RUNNER_TEMP/gomodcache" >> "$GITHUB_ENV"
          echo "GOCACHE=$RUNNER_TEMP/gocache" >> "$GITHUB_ENV"
          # Clean any existing caches and download modules into the isolated cache
          GOMODCACHE="$RUNNER_TEMP/gomodcache" GOCACHE="$RUNNER_TEMP/gocache" go clean -cache -modcache || true
          GOMODCACHE="$RUNNER_TEMP/gomodcache" GOCACHE="$RUNNER_TEMP/gocache" go env
          GOMODCACHE="$RUNNER_TEMP/gomodcache" GOCACHE="$RUNNER_TEMP/gocache" go mod download
      - name: Run golangci-lint inside a Go 1.24 container
        run: |
          export GOFLAGS='-mod=mod'
          # Use an official Go container so we can download modules and build
          # the golangci-lint binary inside the same Go toolchain that will
          # be used for analysis. This avoids export-data/version mismatches.
          docker run --rm \
            -v "$PWD":/app -w /app \
            -v "$RUNNER_TEMP/gomodcache":/gomodcache \
            -v "$RUNNER_TEMP/gocache":/gocache \
            -e GOMODCACHE=/gomodcache -e GOCACHE=/gocache \
            golang:1.24 \
            /bin/sh -lc "set -euo pipefail; export PATH=/usr/local/go/bin:/go/bin:$PATH; /usr/local/go/bin/go version; /usr/local/go/bin/go env; GOMODCACHE=/gomodcache GOCACHE=/gocache /usr/local/go/bin/go mod download; \
              echo '\n--- Running diagnostics: go list and go vet (show errors if any) ---\n'; \
              GOMODCACHE=/gomodcache GOCACHE=/gocache /usr/local/go/bin/go list ./pkg/... ./internal/... || (echo 'go list failed' && exit 2); \
              # Optionally run go vet to surface type-check issues earlier
              GOMODCACHE=/gomodcache GOCACHE=/gocache /usr/local/go/bin/go vet ./pkg/... ./internal/... || true; \
              GOBIN=\"/go/bin\" /usr/local/go/bin/go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.59.0; \
              echo '\n--- Running golangci-lint ---\n'; /go/bin/golangci-lint run --config .golangci.yml ./pkg/... ./internal/..."
