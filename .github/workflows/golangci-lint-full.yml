name: golangci-lint

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: ./.github/actions/ci-setup
        with:
          go-version: 1.24

      - name: Cache Go modules and build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ${{ github.workspace }}/.gomodcache
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Ensure modules downloaded
        run: |
          go env -w GOMODCACHE=${{ github.workspace }}/.gomodcache
          go env
          go mod download

      - name: Run golangci-lint (official action)
        uses: golangci/golangci-lint-action@v4
        with:
          # Let the action install a compatible default golangci-lint binary
          # (omit pin) or set this to a specific v1.x release if you want to
          # pin. Avoid pinning to the legacy 'v2.9.0' binary which lacks newer
          # flags used by the action.
          version: ""
          args: --timeout=10m

      - name: Post-lint (noop)
        if: always()
        run: echo "golangci-lint completed"