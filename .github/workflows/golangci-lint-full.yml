name: golangci-lint

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: ./.github/actions/ci-setup
        with:
          go-version: 1.24.11
      - name: Cache Go modules and golangci state
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/.cache/golangci-lint
            ${{ github.workspace }}/.gomodcache
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Ensure modules downloaded
        run: |
          # Configure a workspace-local GOMODCACHE so runs are hermetic and
          # caching is effective.
          go env -w GOMODCACHE=${{ github.workspace }}/.gomodcache
          go env
          go mod download

      - name: Run golangci-lint (action, pinned v2)
        uses: golangci/golangci-lint-action@v4
        with:
          version: v2.9.0
          args: --timeout=10m

      - name: Upload golangci-lint cache (optional)
        if: always()
        run: echo "lint complete"