name: golangci-lint

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: ./.github/actions/ci-setup
        with:
          go-version: 1.24

      - name: Cache Go modules and build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/.cache/golangci-lint
            ${{ github.workspace }}/.gomodcache
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Ensure modules downloaded
        run: |
          go env -w GOMODCACHE=${{ github.workspace }}/.gomodcache
          go env
          go mod download

      - name: Run golangci-lint (official action)
        uses: golangci/golangci-lint-action@v4
        with:
          # Pin the golangci-lint tool version to a stable release if desired.
          # Leave empty to let the action choose a good default, or set e.g. "v1.58.0".
          version: "v2.9.0"
          # Optional args forwarded to golangci-lint; keep timeout conservative.
          args: --timeout=10m

      - name: Post-lint (noop)
        if: always()
        run: echo "golangci-lint completed"