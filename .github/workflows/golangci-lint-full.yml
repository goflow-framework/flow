name: golangci-lint

on:
  pull_request:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  golangci-lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.24'
      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ${{ github.workspace }}/pkg/mod
          key: ${{ runner.OS }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.OS }}-go-
      - name: Install golangci-lint (build with runner toolchain)
        run: |
          # Build golangci-lint with the runner's Go toolchain so export data
          # versions match (avoids `could not load export data` errors).
          export GOPATH=$(go env GOPATH)
          GOBIN="$GOPATH/bin"
          echo "GOBIN=$GOBIN"
          # build pinned version
          GOBIN="$GOBIN" go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.59.0
          echo "golangci-lint installed at: $(go env GOPATH)/bin/golangci-lint"
          ls -la "$GOBIN" || true
      - name: Run golangci-lint (built from runner toolchain)
        env:
          PATH: ${{ runner.tool_cache }}:${{ github.workspace }}:$(go env GOPATH)/bin:${{ env.PATH }}
        run: |
          # Ensure the built binary is on PATH and run checks
          export PATH="$(go env GOPATH)/bin:$PATH"
          golangci-lint --version
          golangci-lint run --out-format=github-actions --timeout=10m
      - name: Debug (image & container toolchain)
        run: |
          # Record the image the job asked for (rendered by Actions)
          echo "JOB_CONTAINER_IMAGE: ${{ job.container.image }}" > ./ci-export-typecheck/job_container_image.txt || true
          echo "ANALYZER_IMAGE env: ${ANALYZER_IMAGE:-}" >> ./ci-export-typecheck/job_container_image.txt || true

          # Probe container-local Go toolchain and preserved stdlib
          if [ -x /usr/local/go/bin/go ]; then
            /usr/local/go/bin/go version > ./ci-export-typecheck/go_version_runtime.txt 2>&1 || true
            /usr/local/go/bin/go env -json > ./ci-export-typecheck/go_env_runtime.json 2>&1 || true
            echo "Listing /usr/local/go/pkg (first 200 lines):" > ./ci-export-typecheck/goroot_pkg_runtime.txt || true
            ls -la /usr/local/go/pkg | sed -n '1,200p' >> ./ci-export-typecheck/goroot_pkg_runtime.txt 2>&1 || true
            ARCH_DIR="/usr/local/go/pkg/$(/usr/local/go/bin/go env GOOS)_$(/usr/local/go/bin/go env GOARCH)"
            echo "Listing arch dir: $ARCH_DIR" > ./ci-export-typecheck/goroot_pkg_arch_runtime.txt || true
            ls -la "$ARCH_DIR" | sed -n '1,200p' >> ./ci-export-typecheck/goroot_pkg_arch_runtime.txt 2>&1 || true
            /usr/local/go/bin/go list -json sync/atomic > ./ci-export-typecheck/sync_atomic_runtime.json 2>&1 || true
          else
            echo "/usr/local/go/bin/go not found in container" > ./ci-export-typecheck/go_missing.txt || true
          fi

          # golangci-lint binary inspection
          command -v golangci-lint > ./ci-export-typecheck/which_golangci_runtime.txt 2>&1 || true
          if command -v golangci-lint >/dev/null 2>&1; then
            golangci-lint --version > ./ci-export-typecheck/golangci_version_runtime.txt 2>&1 || true
            file $(command -v golangci-lint) > ./ci-export-typecheck/golangci_file_runtime.txt 2>&1 || true
            sha256sum $(command -v golangci-lint) > ./ci-export-typecheck/golangci_sha256_runtime.txt 2>&1 || true
            strings $(command -v golangci-lint) | grep -Eo 'go[0-9]+\.[0-9]+' | head -n 10 > ./ci-export-typecheck/golangci_strings_runtime.txt 2>&1 || true
          fi
      - name: Run blocking typecheck (debug) inside analyzer container
        run: |
          if [ -f .github/scripts/run-golangci-in-container.sh ]; then
            mkdir -p ./ci-export-typecheck || true
            echo "Preflight: ls .github/scripts" > ./ci-export-typecheck/ls_dot_github_scripts.txt || true
            ls -la .github/scripts >> ./ci-export-typecheck/ls_dot_github_scripts.txt 2>&1 || true
            if [ -f .github/scripts/run-golangci-in-container.sh ]; then
              stat -c '%a %U %G %n' .github/scripts/run-golangci-in-container.sh > ./ci-export-typecheck/run_helper_stat.txt 2>&1 || true
            else
              echo "not found" > ./ci-export-typecheck/run_helper_stat.txt || true
            fi

            chmod +x .github/scripts/run-golangci-in-container.sh || true
            printf "%s\n" "container-entered: $(date -u)" > ./ci-export-typecheck/container_started.txt || true
            # CI debug preflight: record where golangci-lint is and its version (if present)
            command -v golangci-lint > ./ci-export-typecheck/which_golangci_preflight.txt 2>&1 || true
            golangci-lint --version > ./ci-export-typecheck/golangci_version_preflight.txt 2>&1 || true
            GOMODCACHE=/tmp/gomodcache_fresh GOCACHE=/tmp/gocache_fresh HOST_UID="$(id -u)" HOST_GID="$(id -g)" CI_EXPORT_DIR=./ci-export-typecheck /bin/bash .github/scripts/run-golangci-in-container.sh _blocking_debug > ./ci-export-typecheck/helper_stdout.txt 2> ./ci-export-typecheck/helper_stderr.txt || echo "$?" > ./ci-export-typecheck/helper_exit_code
            mkdir -p ./ci-export-typecheck
            touch ./ci-export-typecheck/.writable_check || true
            ls -la ./ci-export-typecheck > ./ci-export-typecheck/ls_before_helper.txt 2>&1 || true
          else
            echo "helper script not found" > ./ci-export-typecheck/golangci_typecheck_blocking_debug.out || true
            echo 2 > ./ci-export-typecheck/golangci_exit_code_blocking_debug || true
          fi
      - name: Archive debug diagnostic outputs
        if: always()
        run: |
          mkdir -p ci-export-typecheck
          tar -czf ci-export-typecheck-blocking-debug.tar.gz ci-export-typecheck || true
      - name: Upload debug diagnostics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: golangci-typecheck-diagnostics-blocking-debug
          path: ci-export-typecheck-blocking-debug.tar.gz

  # Forced blocking job: run the blocking typecheck regardless of the gate.
  # This is temporary and intended to collect full blocking diagnostics for debugging only.
  typecheck-blocking-force:
    name: Typecheck (blocking, force)
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository_owner }}/golangci-analyzer:1.24.11-2.8.0
    env:
      ULTRA_AGGRESSIVE_CLEAN: '1'
      FORCE_REBUILD_GOLANGCI: '1'
      CI_DEBUG_STRACE: '1'
      CI_DEBUG_FULL_DIAGS: '1'
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Create export dir (blocking-force)
        run: |
          mkdir -p ./ci-export-typecheck
      - name: Debug (image & container toolchain)
        run: |
          # Record the image the job asked for (rendered by Actions)
          echo "JOB_CONTAINER_IMAGE: ${{ job.container.image }}" > ./ci-export-typecheck/job_container_image.txt || true
          echo "ANALYZER_IMAGE env: ${ANALYZER_IMAGE:-}" >> ./ci-export-typecheck/job_container_image.txt || true

          # Probe container-local Go toolchain and preserved stdlib
          if [ -x /usr/local/go/bin/go ]; then
            /usr/local/go/bin/go version > ./ci-export-typecheck/go_version_runtime.txt 2>&1 || true
            /usr/local/go/bin/go env -json > ./ci-export-typecheck/go_env_runtime.json 2>&1 || true
            echo "Listing /usr/local/go/pkg (first 200 lines):" > ./ci-export-typecheck/goroot_pkg_runtime.txt || true
            ls -la /usr/local/go/pkg | sed -n '1,200p' >> ./ci-export-typecheck/goroot_pkg_runtime.txt 2>&1 || true
            ARCH_DIR="/usr/local/go/pkg/$(/usr/local/go/bin/go env GOOS)_$(/usr/local/go/bin/go env GOARCH)"
            echo "Listing arch dir: $ARCH_DIR" > ./ci-export-typecheck/goroot_pkg_arch_runtime.txt || true
            ls -la "$ARCH_DIR" | sed -n '1,200p' >> ./ci-export-typecheck/goroot_pkg_arch_runtime.txt 2>&1 || true
            /usr/local/go/bin/go list -json sync/atomic > ./ci-export-typecheck/sync_atomic_runtime.json 2>&1 || true
          else
            echo "/usr/local/go/bin/go not found in container" > ./ci-export-typecheck/go_missing.txt || true
          fi

          # golangci-lint binary inspection
          command -v golangci-lint > ./ci-export-typecheck/which_golangci_runtime.txt 2>&1 || true
          if command -v golangci-lint >/dev/null 2>&1; then
            golangci-lint --version > ./ci-export-typecheck/golangci_version_runtime.txt 2>&1 || true
            file $(command -v golangci-lint) > ./ci-export-typecheck/golangci_file_runtime.txt 2>&1 || true
            sha256sum $(command -v golangci-lint) > ./ci-export-typecheck/golangci_sha256_runtime.txt 2>&1 || true
            strings $(command -v golangci-lint) | grep -Eo 'go[0-9]+\.[0-9]+' | head -n 10 > ./ci-export-typecheck/golangci_strings_runtime.txt 2>&1 || true
          fi
      - name: Run blocking typecheck (force) inside analyzer container
        run: |
          if [ -f .github/scripts/run-golangci-in-container.sh ]; then
            mkdir -p ./ci-export-typecheck || true
            echo "Preflight: ls .github/scripts" > ./ci-export-typecheck/ls_dot_github_scripts.txt || true
            ls -la .github/scripts >> ./ci-export-typecheck/ls_dot_github_scripts.txt 2>&1 || true
            if [ -f .github/scripts/run-golangci-in-container.sh ]; then
              stat -c '%a %U %G %n' .github/scripts/run-golangci-in-container.sh > ./ci-export-typecheck/run_helper_stat.txt 2>&1 || true
            else
              echo "not found" > ./ci-export-typecheck/run_helper_stat.txt || true
            fi

            chmod +x .github/scripts/run-golangci-in-container.sh || true
            printf "%s\n" "container-entered: $(date -u)" > ./ci-export-typecheck/container_started.txt || true
            # CI debug preflight: record where golangci-lint is and its version (if present)
            command -v golangci-lint > ./ci-export-typecheck/which_golangci_preflight.txt 2>&1 || true
            golangci-lint --version > ./ci-export-typecheck/golangci_version_preflight.txt 2>&1 || true
            GOMODCACHE=/tmp/gomodcache_fresh GOCACHE=/tmp/gocache_fresh HOST_UID="$(id -u)" HOST_GID="$(id -g)" CI_EXPORT_DIR=./ci-export-typecheck ULTRA_AGGRESSIVE_CLEAN=1 /bin/bash .github/scripts/run-golangci-in-container.sh _blocking_force > ./ci-export-typecheck/helper_stdout.txt 2> ./ci-export-typecheck/helper_stderr.txt || echo "$?" > ./ci-export-typecheck/helper_exit_code
            mkdir -p ./ci-export-typecheck
            touch ./ci-export-typecheck/.writable_check || true
            ls -la ./ci-export-typecheck > ./ci-export-typecheck/ls_before_helper.txt 2>&1 || true
          else
            echo "helper script not found" > ./ci-export-typecheck/golangci_typecheck_blocking_force.out || true
            echo 2 > ./ci-export-typecheck/golangci_exit_code_blocking_force || true
          fi
