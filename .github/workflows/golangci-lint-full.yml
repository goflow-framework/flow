name: golangci-lint

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go (shared)
        uses: ./.github/actions/ci-setup
        with:
          go-version: 1.24
          gomodcache: ${{ github.workspace }}/.gomodcache
          goproxy: https://proxy.golang.org,direct
          gosumdb: sum.golang.org

      - name: Cache Go modules and build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ${{ github.workspace }}/.gomodcache
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Ensure modules downloaded
        run: |
          # ci-setup configured GOMODCACHE/GOPROXY/GOSUMDB; download modules now
          go mod download

      - name: Install golangci-lint v2 (manual)
        run: |
          # Pin to a known v2 release that matches .golangci.yml (version: "2").
          TAG=v2.9.0
          VERSION=${TAG#v}
          echo "Downloading golangci-lint ${TAG} (asset version ${VERSION})"
          curl -sSfL "https://github.com/golangci/golangci-lint/releases/download/${TAG}/golangci-lint-${VERSION}-linux-amd64.tar.gz" -o /tmp/golangci.tar.gz
          tar -xzf /tmp/golangci.tar.gz -C $HOME
          ls -la $HOME/golangci-lint-${VERSION}-linux-amd64 || true

      - name: Run golangci-lint (v2 pinned)
        run: |
          VERSION=2.9.0
          BINDIR=$HOME/golangci-lint-${VERSION}-linux-amd64
          $BINDIR/golangci-lint --version
          # Run with a conservative timeout. Avoid passing --out-format which
          # may not be supported by the particular golangci-lint build used on
          # the runner; formatting/annotation behavior can be controlled via
          # .golangci.yml if needed.
          $BINDIR/golangci-lint run --timeout=10m

      - name: Post-lint (noop)
        if: always()
        run: echo "golangci-lint completed"