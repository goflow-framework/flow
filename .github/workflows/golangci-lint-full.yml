name: golangci-lint

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.24.11'
      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/.cache/golangci-lint
            ${{ env.GOMODCACHE }}
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Ensure modules downloaded
        run: |
          go env -w GOMODCACHE=${{ github.workspace }}/.gomodcache
          go env
          go mod download

      - name: Install golangci-lint v2.9.0
        run: |
          curl -sSfL https://github.com/golangci/golangci-lint/releases/download/v2.9.0/golangci-lint-2.9.0-linux-amd64.tar.gz -o /tmp/golangci.tar.gz
          tar -xzf /tmp/golangci.tar.gz -C $HOME
          echo "$(pwd)"
          ls -la $HOME/golangci-lint-2.9.0-linux-amd64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run golangci-lint
        run: |
          # show version and installation path for debugging
          $HOME/golangci-lint-2.9.0-linux-amd64/golangci-lint --version || true
          ls -la $HOME/golangci-lint-2.9.0-linux-amd64 || true
          # Run without passing --format/--out-format to avoid flag mismatches
          $HOME/golangci-lint-2.9.0-linux-amd64/golangci-lint run --timeout=10m

      - name: Upload golangci-lint cache (optional)
        if: always()
        run: echo "lint complete"