name: staticcheck (disabled)

# This workflow is retained for historical/reference reasons but is
# intentionally disabled — staticcheck is run now via golangci-lint in
# the main linter job. To re-enable standalone staticcheck, change the
# `on` trigger to `workflow_dispatch` or a desired schedule.
on: []

jobs:
  noop:
    runs-on: ubuntu-latest
    steps:
      - name: Staticcheck is now run via golangci-lint
        run: echo "staticcheck disabled in favor of golangci-lint" 
