name: staticcheck

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  staticcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: ./.github/actions/ci-setup
        with:
          go-version: 1.24
      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest
      - name: Run staticcheck
        run: staticcheck ./...
