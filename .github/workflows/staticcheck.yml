name: staticcheck

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  staticcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: ./.github/actions/ci-setup
        with:
          go-version: 1.24
      - name: Install staticcheck (pinned)
        # Pin staticcheck to a known compatible release to avoid unexpected
        # breakage from @latest. Update the version here when bumping toolchain.
        run: go install honnef.co/go/tools/cmd/staticcheck@v0.6.1
      - name: Run staticcheck
        run: staticcheck ./...
