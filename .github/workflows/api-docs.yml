name: API docs

on:
  schedule:
    - cron: '0 5 * * *' # daily at 05:00 UTC
  workflow_dispatch:

jobs:
  generate-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'

      - name: Generate package docs (HTML)
        run: |
          # Build and run the small docgen tool that wraps `go doc -all` output
          # into simple HTML files under .ci/docs.
          go run ./tools/docgen -out .ci/docs

      - name: Archive docs
        run: |
          tar -czf .ci/api-docs.tar.gz -C .ci docs

      - name: Upload docs artifact
        uses: actions/upload-artifact@v6
        with:
          name: api-docs
          path: .ci/api-docs.tar.gz
