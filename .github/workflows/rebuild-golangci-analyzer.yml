name: rebuild golangci-analyzer image

# Rebuild and republish the pinned analyzer image on a schedule so PRs
# that pull the pinned tag get a fresh image periodically. Also supports
# manual dispatch.
on:
  schedule:
    # daily at 03:00 UTC
    - cron: '0 3 * * *'
  workflow_dispatch: {}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      GHCR_PAT: ${{ secrets.GHCR_PAT }}
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR (use PAT if provided)
        if: ${{ env.GHCR_PAT != '' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Log in to GHCR (fallback to GITHUB_TOKEN)
        if: ${{ env.GHCR_PAT == '' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push analyzer image (scheduled)
        uses: docker/build-push-action@v4
        with:
          context: .github/containers/golangci-analyzer
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/golangci-analyzer:1.24.11-1.59.0
            ghcr.io/${{ github.repository_owner }}/golangci-analyzer:1.24.11-1.59.0-${{ github.run_number }}
          build-args: |
            USE_MAKE_BASH=1
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image push summary
        run: |
          echo "Published analyzer image tags:"
          echo " - ghcr.io/${{ github.repository_owner }}/golangci-analyzer:1.24.11-1.59.0"
          echo " - ghcr.io/${{ github.repository_owner }}/golangci-analyzer:1.24.11-1.59.0-${{ github.run_number }}"
