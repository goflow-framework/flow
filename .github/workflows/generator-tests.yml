name: Generator tests

on:
  push:
    branches: [ main, feat/stabilize-generator-tests ]
  pull_request:
    branches: [ main ]

jobs:
  generator-tests:
    name: Run internal/generator tests (Go 1.24)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.24'

      - name: Ensure environment defaults
        run: |
          echo "GOPROXY=https://proxy.golang.org,direct" >> $GITHUB_ENV
          echo "GOSUMDB=sum.golang.org" >> $GITHUB_ENV

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ${{ env.GOMODCACHE }}
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Run generator tests
        env:
          GOPROXY: ${{ env.GOPROXY }}
          GOSUMDB: ${{ env.GOSUMDB }}
        run: |
          go version
          go env
          go test ./internal/generator -v
