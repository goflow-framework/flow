name: security-scan

on:
  push:
    branches: ["main", "master"]

  # Run on pull requests targeting main/master (will run for this PR if it targets main/master)
  pull_request:
    branches: ["main", "master"]

  # Allow manual runs from Actions UI or gh CLI
  workflow_dispatch: {}

  schedule:
    - cron: '0 4 * * 0' # weekly

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go (for security scan)
        uses: ./.github/actions/ci-setup
        with:
          go-version: 1.24.13
          gomodcache: ${{ github.workspace }}/.gomodcache-security
          goproxy: https://proxy.golang.org,direct
          gosumdb: sum.golang.org

      - name: Prepare modules for scan
        run: |
          # Use workspace-local module & build caches to avoid reading prebuilt
          # export data compiled with a different toolchain/version and to
          # avoid touching the runner's global cache (which may be root-owned).
          WORK_GOMODCACHE="${{ github.workspace }}/.gomodcache-security"
          WORK_GOCACHE="${{ github.workspace }}/.gocache-security"
          WORK_GOPATH="${{ github.workspace }}/.gopath-security"

          # Export for the current shell and persist with `go env -w` so all
          # subsequent `go` invocations in this job use the workspace-local
          # caches.
          export GOMODCACHE="$WORK_GOMODCACHE"
          export GOCACHE="$WORK_GOCACHE"
          export GOPATH="$WORK_GOPATH"
          go env -w GOPATH="$GOPATH"
          go env -w GOMODCACHE="$GOMODCACHE"
          go env -w GOCACHE="$GOCACHE"
          go env -w GOPROXY=https://proxy.golang.org,direct
          go env -w GOSUMDB=sum.golang.org

          # Ensure workspace GOPATH directories exist.
          mkdir -p "$WORK_GOMODCACHE" "$WORK_GOCACHE" "$WORK_GOPATH"

          # Remove any pre-existing workspace-local caches so the job builds
          # fresh exportdata with the current toolchain. IMPORTANT: do this
          # before `go mod download` or installing analysis tools. Avoid
          # touching the runner's global caches.
          rm -rf "$WORK_GOMODCACHE"/* || true
          rm -rf "$WORK_GOCACHE"/* || true
          rm -rf "$WORK_GOPATH"/* || true

          # Download modules into the workspace-local module cache.
          go mod download

          # Diagnostics: show the created caches and effective go environment
          # so logs can help debug any remaining exportdata / version issues.
          echo "--- go env ---"
          go env
          echo "--- GOMODCACHE contents ---"
          ls -la "$WORK_GOMODCACHE" | sed -n '1,200p' || true
          echo "--- GOPATH pkg/mod ---"
          ls -la "$WORK_GOPATH"/pkg/mod 2>/dev/null | sed -n '1,200p' || true

      - name: Install gosec
        run: |
          # Build and install gosec with the job's toolchain. Using `@latest`
          # here lets the tool be built against recent `golang.org/x/tools`
          # that are compatible with the Go toolchain on the runner. Pinning
          # to an older tag can cause x/tools vs exportdata format mismatches
          # (observed as "unsupported version: 2"). If you prefer a pinned
          # version, pick a modern release known to work with Go 1.24.
          go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run gosec (core only, fail on HIGH)
        run: |
          export PATH=$(go env GOPATH)/bin:$PATH
          # Only scan core packages (pkg + internal); only exit non-zero for HIGH severity.
          gosec -severity HIGH ./pkg/... ./internal/...

      - name: Install govulncheck
        run: |
          export PATH=$(go env GOPATH)/bin:$PATH
          # Pin govulncheck to a stable tagged release to avoid CI surprises.
          go install golang.org/x/vuln/cmd/govulncheck@v0.1.0

      - name: Run govulncheck
        run: |
          export PATH=$(go env GOPATH)/bin:$PATH
          govulncheck ./...