name: security-scan

on:
  push:
    branches: ["main", "master"]

  # Run on pull requests targeting main/master (will run for this PR if it targets main/master)
  pull_request:
    branches: ["main", "master"]

  # Allow manual runs from Actions UI or gh CLI
  workflow_dispatch: {}

  schedule:
    - cron: '0 4 * * 0' # weekly

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go (for security scan)
        uses: ./.github/actions/ci-setup
        with:
          go-version: 1.24.13
          gomodcache: ${{ github.workspace }}/.gomodcache-security
          goproxy: https://proxy.golang.org,direct
          gosumdb: sum.golang.org

      - name: Prepare modules for scan
        run: |
          # Use a workspace-local module cache to avoid reading prebuilt
          # export data compiled with a different toolchain/version.
          go env -w GOMODCACHE=${{ github.workspace }}/.gomodcache-security
          go env -w GOPROXY=https://proxy.golang.org,direct
          go env -w GOSUMDB=sum.golang.org
          go mod download
          # Ensure any pre-existing compiled data is removed so analysis
          # tools read fresh export data built with this job's toolchain.
          go clean -cache -modcache || true
          rm -rf ${GOMODCACHE}/* || true
          rm -rf ${GOCACHE}/* || true

      - name: Install gosec
        run: |
          # Install a pinned gosec built with the current toolchain to avoid
          # surprising changes from @latest.
          go install github.com/securego/gosec/v2/cmd/gosec@v2.14.0

      - name: Run gosec (core only, fail on HIGH)
        run: |
          export PATH=$(go env GOPATH)/bin:$PATH
          # Only scan core packages (pkg + internal); only exit non-zero for HIGH severity.
          gosec -severity HIGH ./pkg/... ./internal/...

      - name: Install govulncheck
        run: |
          export PATH=$(go env GOPATH)/bin:$PATH
          # Pin govulncheck to a stable tagged release to avoid CI surprises.
          go install golang.org/x/vuln/cmd/govulncheck@v0.1.0

      - name: Run govulncheck
        run: |
          export PATH=$(go env GOPATH)/bin:$PATH
          govulncheck ./...