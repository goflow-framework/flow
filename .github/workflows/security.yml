name: security-scan

on:
  push:
    branches: ["main", "master"]
  schedule:
    - cron: '0 4 * * 0' # weekly

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v4
        with:
          # Use the same Go toolchain as the project to ensure module
          # install commands succeed when modules declare newer 'go'
          # directives (eg. 'go 1.24').
          go-version: '1.24.11'

      - name: Install gosec
        run: |
          # Install a recent gosec built with the current toolchain.
          go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run gosec (core only, fail on HIGH)
        run: |
          export PATH=$(go env GOPATH)/bin:$PATH
          # Only scan core packages (pkg + internal); only exit non-zero for HIGH severity.
          gosec -severity HIGH ./pkg/... ./internal/...

      - name: Run govulncheck
        run: |
          export PATH=$(go env GOPATH)/bin:$PATH
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...