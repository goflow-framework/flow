name: security-scan

on:
  push:
    branches: ["main", "master"]

  # Run on pull requests targeting main/master (will run for this PR if it targets main/master)
  pull_request:
    branches: ["main", "master"]

  # Allow manual runs from Actions UI or gh CLI
  workflow_dispatch: {}

  schedule:
    - cron: '0 4 * * 0' # weekly

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go (for security scan)
        uses: ./.github/actions/ci-setup
        with:
          go-version: 1.24.13
          gomodcache: ${{ github.workspace }}/.gomodcache-security
          goproxy: https://proxy.golang.org,direct
          gosumdb: sum.golang.org

      - name: Prepare modules for scan
        run: |
          # Use workspace-local module & build caches to avoid reading prebuilt
          # export data compiled with a different toolchain/version and to
          # avoid touching the runner's global cache (which may be root-owned).
          WORK_GOMODCACHE="${{ github.workspace }}/.gomodcache-security"
          WORK_GOCACHE="${{ github.workspace }}/.gocache-security"

          # Export for the current shell and persist with `go env -w` so all
          # subsequent `go` invocations in this job use the workspace-local
          # caches.
          export GOMODCACHE="$WORK_GOMODCACHE"
          export GOCACHE="$WORK_GOCACHE"
          go env -w GOMODCACHE="$GOMODCACHE"
          go env -w GOCACHE="$GOCACHE"
          go env -w GOPROXY=https://proxy.golang.org,direct
          go env -w GOSUMDB=sum.golang.org

          # Download modules into the workspace-local module cache.
          go mod download

          # Clean only the workspace-local caches (safe). Avoid `go clean -modcache`
          # or removing the global module cache since the runner's default
          # cache may contain files we can't remove (permission denied).
          go clean -cache || true
          rm -rf "$WORK_GOMODCACHE"/* || true
          rm -rf "$WORK_GOCACHE"/* || true

      - name: Install gosec
        run: |
          # Install a pinned gosec built with the current toolchain to avoid
          # surprising changes from @latest.
          go install github.com/securego/gosec/v2/cmd/gosec@v2.14.0

      - name: Run gosec (core only, fail on HIGH)
        run: |
          export PATH=$(go env GOPATH)/bin:$PATH
          # Only scan core packages (pkg + internal); only exit non-zero for HIGH severity.
          gosec -severity HIGH ./pkg/... ./internal/...

      - name: Install govulncheck
        run: |
          export PATH=$(go env GOPATH)/bin:$PATH
          # Pin govulncheck to a stable tagged release to avoid CI surprises.
          go install golang.org/x/vuln/cmd/govulncheck@v0.1.0

      - name: Run govulncheck
        run: |
          export PATH=$(go env GOPATH)/bin:$PATH
          govulncheck ./...