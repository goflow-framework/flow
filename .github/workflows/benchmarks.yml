name: benchmarks

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1' # weekly on Monday UTC

jobs:
  benchmarks:
    name: Run Go benchmarks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: ./.github/actions/ci-setup
        with:
          go-version: 1.24

      - name: Cache Go modules and build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/.cache/gomod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install tools (staticcheck optional)
        run: |
          # Pin staticcheck to a concrete version to avoid flakes caused by
          # tool changes when using @latest. Keep the step optional for
          # environments that don't need staticcheck.
          go install honnef.co/go/tools/cmd/staticcheck@v0.6.0 || true

      - name: Run router benchmarks
        run: |
          mkdir -p bench-output
          echo "== router benchmarks ==" > bench-output/router_bench.txt
          go test ./internal/router -bench . -benchmem -run ^$ >> bench-output/router_bench.txt

      - name: Run flow package benchmarks
        run: |
          echo "== pkg/flow benchmarks ==" > bench-output/flow_bench.txt
          go test ./pkg/flow -bench . -benchmem -run ^$ >> bench-output/flow_bench.txt

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmarks
          path: bench-output
          retention-days: 14
