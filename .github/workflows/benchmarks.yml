name: benchmarks

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1' # weekly on Monday UTC

jobs:
  benchmarks:
    name: Run Go benchmarks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.20'

      - name: Cache Go modules and build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/.cache/gomod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install tools (staticcheck optional)
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest || true

      - name: Run router benchmarks
        run: |
          mkdir -p bench-output
          echo "== router benchmarks ==" > bench-output/router_bench.txt
          go test ./internal/router -bench . -benchmem -run ^$ >> bench-output/router_bench.txt

      - name: Run flow package benchmarks
        run: |
          echo "== pkg/flow benchmarks ==" > bench-output/flow_bench.txt
          go test ./pkg/flow -bench . -benchmem -run ^$ >> bench-output/flow_bench.txt

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmarks
          path: bench-output
