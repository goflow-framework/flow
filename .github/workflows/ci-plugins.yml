name: CI - Plugins

on:
  push:
    branches: [ main, feature/** ]
  pull_request:
    branches: [ main ]

jobs:
  test-plugins:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.24
      - name: Run go vet
        run: |
          go vet ./...
      - name: Download modules
        run: |
          go mod download
      - name: Cache golangci-lint
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/golangci-lint
          key: ${{ runner.os }}-golangci-lint-${{ hashFiles('**/go.sum') }}
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: v1.59.0
          # Build/install the binary with the repository Go toolchain to avoid
          # mismatches between the prebuilt binary and the module export
          # format (causes "unsupported version" typecheck errors).
          install: true
          args: run ./... --out-format colored-line-number
      - name: Run plugin and contrib tests
        run: |
          go test ./contrib/... ./... -v

  build-examples:
    runs-on: ubuntu-latest
    needs: test-plugins
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.24
      - name: Build examples
        run: |
          go build -v ./examples/...
