name: CI - Plugins

on:
  push:
    branches: [ main, feature/** ]
  pull_request:
    branches: [ main ]

jobs:
  test-plugins:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.24
      - name: Run go vet
        run: |
          go vet ./...
      - name: Download modules
        run: |
          go mod download
      - name: Cache golangci-lint
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/golangci-lint
          key: ${{ runner.os }}-golangci-lint-${{ hashFiles('**/go.sum') }}
      - name: Install golangci-lint
        run: |
          # Install golangci-lint using the runner Go toolchain so the
          # binary is built against the same Go version used for type info.
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.59.0
      - name: Run golangci-lint
        run: |
          # Ensure the installed binary is on PATH and run the linter.
          export PATH="$(go env GOPATH)/bin:$PATH"
          golangci-lint run ./... --out-format colored-line-number
      - name: Run plugin and contrib tests
        run: |
          go test ./contrib/... ./... -v

  build-examples:
    runs-on: ubuntu-latest
    needs: test-plugins
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.24
      - name: Build examples
        run: |
          go build -v ./examples/...
