name: CI - Plugins

on:
  push:
    branches: [ main, feature/** ]
  pull_request:
    branches: [ main ]

jobs:
  test-plugins:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.24
      - name: Run plugin and contrib tests
        run: |
          go test ./contrib/... ./... -v

  build-examples:
    runs-on: ubuntu-latest
    needs: test-plugins
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.24
      - name: Build examples
        run: |
          go build -v ./examples/...
