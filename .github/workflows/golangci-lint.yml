name: golangci-lint

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  golangci-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.24'
      - name: Print go env
        run: |
          go version
          go env
      - name: Install dependencies
        run: go mod download
      - name: Clean go caches
        run: |
          go clean -cache -modcache || true
      - name: Run golangci-lint (core packages only)
        uses: golangci/golangci-lint-action@v4
        with:
          version: v1.59.0
          # run only on core packages to avoid examples/tools causing analyzer errors
          args: --config .golangci.yml ./pkg/... ./internal/...
