name: golangci-lint

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  golangci-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.24'
      - name: Print go env
        run: |
          go version
          go env
      - name: Install dependencies
        run: go mod download
      - name: Clean go caches
        run: |
          go clean -cache -modcache || true
      - name: Install golangci-lint (build with local Go)
        run: |
          GOBIN=$(go env GOPATH)/bin
          mkdir -p "$GOBIN"
          GOBIN="$GOBIN" go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.59.0

      - name: Run golangci-lint
        run: |
          export GOFLAGS='-mod=mod'
          $(go env GOPATH)/bin/golangci-lint run --config .golangci.yml ./...
