name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  # Allow the nightly matrix job to run on a schedule and manually.
  schedule:
    - cron: '0 4 * * *' # daily at 04:00 UTC
  workflow_dispatch: {}

jobs:
  lint-and-test:
    name: Lint, Vet, Test, Coverage
    if: ${{ github.event_name != 'schedule' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go (shared)
        uses: ./.github/actions/ci-setup
        with:
          go-version: '1.24'

      - name: Cache Go modules
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.OS }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.OS }}-go-

      - name: Install modules
        run: go mod download

      - name: Run go vet
        run: go vet ./...

      # staticcheck moved to a dedicated job so heavy linting doesn't slow the
      # main lint-and-test pipeline. See `staticcheck` job below.

      - name: Check gofmt
        run: |
          # Use the centralized script which checks only tracked files to avoid
          # accidentally reporting files inside a workspace-local module cache.
          # Run via bash to avoid relying on the executable bit in the checked
          # out repository which may not be preserved on GitHub runners.
          bash ./.github/scripts/check_gofmt.sh

      - name: Run tests with coverage (exclude generator integration)
        run: |
          mkdir -p .ci
          # Select only packages that have test files. This avoids passing
          # -coverprofile to main-only packages (tools/, examples/, cmd/*
          # without tests) which trigger "go: no such tool covdata" on Go 1.24+.
          # internal/generator runs in its own isolated job with a pinned toolchain.
          go list -f '{{if or .TestGoFiles .XTestGoFiles}}{{.ImportPath}}{{end}}' ./... \
            | grep -v "internal/generator" \
            | xargs go test -coverprofile=.ci/coverage.out -covermode=atomic

      - name: Enforce coverage threshold (≥ 50%)
        run: |
          pct=$(go tool cover -func=.ci/coverage.out \
                  | awk '/^total:/ { gsub(/%/, "", $3); print $3 }')
          echo "Total coverage: ${pct}%"
          awk -v pct="$pct" 'BEGIN {
            if (pct + 0 < 50) {
              print "FAIL: coverage " pct "% is below the 50% threshold"
              exit 1
            }
            print "PASS: coverage " pct "% meets the 50% threshold"
          }'

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: .ci/coverage.out

      - name: Run benchmarks (basic)
        run: go test -bench=. -run=^$ ./...

      - name: Run RequestID microbenchmark (pkg/flow)
        run: |
          mkdir -p .ci/bench
          # Run only the microbenchmarks for request id generators and save output
          go test ./pkg/flow -bench Benchmark -benchmem -run TestFastRequestIDFormat > .ci/bench/requestid_bench.txt

      - name: Upload requestid benchmark artifact
        uses: actions/upload-artifact@v7
        with:
          name: requestid-benchmark
          path: .ci/bench/requestid_bench.txt
  build-binaries:
    name: Build cross-platform binaries
    if: ${{ github.event_name != 'schedule' }}
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go (shared)
        uses: ./.github/actions/ci-setup
        with:
          go-version: '1.24'

      - name: Prepare output dir
        run: mkdir -p release

      - name: Build linux/amd64 binary
        run: |
          GOOS=linux GOARCH=amd64 go build -o release/flow-linux-amd64 ./cmd/flow

      - name: Build linux/arm64 binary
        run: |
          GOOS=linux GOARCH=arm64 go build -o release/flow-linux-arm64 ./cmd/flow

      - name: Build windows/amd64 binary
        run: |
          GOOS=windows GOARCH=amd64 go build -o release/flow-windows-amd64.exe ./cmd/flow

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: flow-binaries
          path: release/

  integration:
    name: Integration tests
    if: ${{ github.event_name != 'schedule' }}
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go (shared)
        uses: ./.github/actions/ci-setup
        with:
          go-version: '1.24'

      - name: Run integration tests
        run: |
          # Placeholder: add integration test commands here when available.
          # This step intentionally exits 0 when there is nothing to run so
          # the job stays green without silencing real failures via || true.
          echo "No integration tests configured yet."

  generator-compile:
    name: Generator compile tests (isolated)
    if: ${{ github.event_name != 'schedule' }}
    runs-on: ubuntu-latest
    needs: lint-and-test
    strategy:
      matrix:
        # Updated matrix to focus on supported/pinned toolchains.
        # Assumption: we want to exercise recent stable Go releases.
        go-version: [1.24, 1.25, 1.26]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go (shared)
        uses: ./.github/actions/ci-setup
        with:
          go-version: ${{ matrix.go-version }}
          gomodcache: ${{ github.workspace }}/.gomodcache
          goproxy: https://proxy.golang.org,direct
          gosumdb: sum.golang.org

      - name: Cache Go build cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ${{ github.workspace }}/.gomodcache
          key: ${{ runner.OS }}-go-${{ matrix.go-version }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.OS }}-go-${{ matrix.go-version }}-

      # go env configuration is handled by the shared ci-setup action above

      - name: Install modules
        run: |
          # Ensure the download uses the configured GOMODCACHE/GOPROXY
          go mod download

      - name: Run generator CLI integration tests
        run: |
          mkdir -p .ci/integration
          echo "Running generator tests on Go ${{ matrix.go-version }}"
          # Create a temporary module so generator tests that create temp modules
          # can write a go.mod which uses an absolute replace to the checked-out
          # repository. This avoids relying on the runner global module cache.
          TMPDIR=$(mktemp -d)
          pushd "$TMPDIR"
          go mod init tmpgen || true
          # Add a dummy requirement and replace it with the checked-out workspace
          go mod edit -require=github.com/goflow-framework/flow@v0.0.0 || true
          go mod edit -replace=github.com/goflow-framework/flow=${GITHUB_WORKSPACE} || true
          # Run the generator tests by targeting the package path explicitly so
          # the temporary module is used for the test invocation.
          go test ${GITHUB_WORKSPACE}/internal/generator -v 2>&1 | tee ${GITHUB_WORKSPACE}/.ci/integration/generator_tests_${{ matrix.go-version }}.txt
          popd

      - name: Upload generator integration artifact
        uses: actions/upload-artifact@v7
        with:
          # Include run_attempt in the artifact name so that manual re-runs of
          # the same workflow run do not produce a 409 Conflict. The run_attempt
          # counter increments every time the workflow (or a failed job within
          # it) is re-run, guaranteeing a unique artifact name even when the
          # same Go version is exercised more than once on the same run ID.
          name: generator-compile-${{ matrix.go-version }}-attempt${{ github.run_attempt }}
          path: .ci/integration/generator_tests_${{ matrix.go-version }}.txt
          overwrite: true
  # staticcheck moved to a dedicated workflow (`.github/workflows/staticcheck.yml`)
  # and now runs on pushes to `main`. Removing the inline `staticcheck` job
  # here avoids duplicate lint runs on push to `main` while keeping the
  # dedicated workflow for branch-level linting.
  test:
    name: Test (Go ${{ matrix.go-version }})
    if: ${{ github.event_name != 'schedule' }}
    runs-on: ubuntu-latest
    needs: lint-and-test
    strategy:
      matrix:
        go-version: [1.24, 1.25, 1.26]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Go (shared)
        uses: ./.github/actions/ci-setup
        with:
          go-version: ${{ matrix.go-version }}

      - name: Cache Go build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ matrix.go-version }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ matrix.go-version }}-

      - name: Print go env
        run: |
          go version
          go env

      - name: Install dependencies
        run: go mod download

      - name: Check formatting
        run: |
          set -e
          # Only check tracked Go files to avoid scanning local module cache
          out=$(git ls-files '*.go' | xargs -r gofmt -l)
          if [ -n "$out" ]; then
            echo "Files need formatting:"; echo "$out"; exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Run tests (verbose, no cache)
        run: go test ./... -v -count=1

  generator-nightly:
    name: Generator nightly matrix
    runs-on: ubuntu-latest
    # Run nightly across multiple Go versions and optional GOPROXY values
    # to increase coverage and surface toolchain / proxy-related flakes.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        # Nightly runs exercise several recent Go versions and a variety
        # of GOPROXY settings. We include a sentinel value "PRIVATE_GOPROXY"
        # which, when selected, will use the repository secret
        # `PRIVATE_GOPROXY` so private mirrors can be exercised without
        # exposing the value in the matrix itself.
        go-version: [1.24, 1.25, 1.26]
        goproxy: ["https://proxy.golang.org,direct", "https://goproxy.cn,direct", "direct", "PRIVATE_GOPROXY"]
    env:
      # Initialize SANITIZED_GOPROXY so workflow parsing/validation accepts
      # references to this env var in later steps; it will be overwritten at
      # runtime by the sanitization step inserted before caching.
      SANITIZED_GOPROXY: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go (shared)
        uses: ./.github/actions/ci-setup
        with:
          go-version: ${{ matrix.go-version }}
          gomodcache: ${{ github.workspace }}/.gomodcache
          gosumdb: sum.golang.org

      - name: Configure GOPROXY (nightly matrix)
        env:
          PRIVATE_GOPROXY: ${{ secrets.PRIVATE_GOPROXY }}
        run: |
          # Handle a sentinel value for private GOPROXY entries. If the
          # matrix value is the sentinel "PRIVATE_GOPROXY", prefer the
          # repository secret `PRIVATE_GOPROXY`. If the secret isn't set,
          # fall back to a safe default (direct) rather than failing the
          # workflow. This makes the nightly matrix optional for private
          # proxy testing.
          if [ "${{ matrix.goproxy }}" = "PRIVATE_GOPROXY" ]; then
            if [ -z "$PRIVATE_GOPROXY" ]; then
              echo "PRIVATE_GOPROXY not set in secrets; falling back to 'direct'"
              go env -w GOPROXY=direct
            else
              go env -w GOPROXY="$PRIVATE_GOPROXY"
            fi
          else
            go env -w GOPROXY="${{ matrix.goproxy }}"
          fi

      - name: Sanitize GOPROXY for cache key
        run: |
          # SANITIZED_GOPROXY: derived from the actual runtime GOPROXY value.
          # Used only for cache keys where the resolved proxy URL is relevant.
          ACTUAL_GOPROXY=$(go env GOPROXY)
          echo "Using GOPROXY: $ACTUAL_GOPROXY"
          SANITIZED_GOPROXY=$(echo "$ACTUAL_GOPROXY" | sed 's/[^A-Za-z0-9]/_/g')
          echo "SANITIZED_GOPROXY=$SANITIZED_GOPROXY" >> $GITHUB_ENV

          # ARTIFACT_GOPROXY_KEY: always derived from the matrix label, never
          # the resolved runtime value. This is critical for artifact names:
          # when matrix.goproxy == "PRIVATE_GOPROXY" and the secret is absent,
          # the runtime GOPROXY falls back to "direct" -- identical to the
          # explicit matrix leg (go-version, "direct"). Using the matrix label
          # keeps the two legs distinct and prevents a 409 Conflict.
          ARTIFACT_GOPROXY_KEY=$(echo "${{ matrix.goproxy }}" | sed 's/[^A-Za-z0-9]/_/g')
          echo "ARTIFACT_GOPROXY_KEY=$ARTIFACT_GOPROXY_KEY" >> $GITHUB_ENV

      - name: Cache Go build cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ${{ github.workspace }}/.gomodcache
          # Use the sanitized GOPROXY value exported to the environment by the
          # previous step so the cache key doesn't contain commas or other
          # disallowed characters.
          key: ${{ runner.OS }}-go-${{ matrix.go-version }}-${{ hashFiles('**/go.sum') }}-${{ env.SANITIZED_GOPROXY }}
          restore-keys: |
            ${{ runner.OS }}-go-${{ matrix.go-version }}-

      - name: Install modules
        run: go mod download

      - name: Run generator CLI integration tests (nightly matrix)
        run: |
          mkdir -p .ci/integration
          echo "Running generator tests on Go ${{ matrix.go-version }} GOPROXY=${{ matrix.goproxy }}"
          GP="${{ matrix.goproxy }}"
          sanitized=$(echo "$GP" | sed 's/[^a-zA-Z0-9]/_/g')
          file=".ci/integration/generator_tests_${{ matrix.go-version }}_${sanitized}.txt"
          TMPDIR=$(mktemp -d)
          pushd "$TMPDIR"
          go mod init tmpgen || true
          go mod edit -require=github.com/goflow-framework/flow@v0.0.0 || true
          go mod edit -replace=github.com/goflow-framework/flow=${GITHUB_WORKSPACE} || true
          go test ${GITHUB_WORKSPACE}/internal/generator -v 2>&1 | tee "${GITHUB_WORKSPACE}/$file"
          popd

      - name: Upload generator integration artifact
        uses: actions/upload-artifact@v7
        with:
          # Use ARTIFACT_GOPROXY_KEY (derived from the matrix label, not the
          # resolved runtime GOPROXY) so that the "PRIVATE_GOPROXY" sentinel
          # leg and the explicit "direct" leg never produce the same name.
          # When the secret is absent and the runtime falls back to "direct",
          # ARTIFACT_GOPROXY_KEY remains "PRIVATE_GOPROXY" -- keeping the two
          # legs distinct and avoiding a 409 Conflict.
          # run_attempt is appended so manual re-runs of the same workflow run
          # also produce a unique name rather than colliding with attempt 1.
          name: generator-nightly-${{ matrix.go-version }}-${{ env.ARTIFACT_GOPROXY_KEY }}-attempt${{ github.run_attempt }}
          path: .ci/integration/*.txt
          overwrite: true


