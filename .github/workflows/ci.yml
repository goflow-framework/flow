name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    name: Lint, Vet, Test, Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.24'

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ${{ github.workspace }}/pkg/mod
          key: ${{ runner.OS }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.OS }}-go-

      - name: Install modules
        run: go mod download

      - name: Run go vet
        run: go vet ./...

      # staticcheck moved to a dedicated job so heavy linting doesn't slow the
      # main lint-and-test pipeline. See `staticcheck` job below.

      - name: Check gofmt
        run: |
          files=$(gofmt -l . | wc -l)
          if [ "$files" -ne 0 ]; then
            echo "gofmt found files that need formatting:" && gofmt -l .
            exit 1
          fi

      - name: Run tests with coverage (exclude generator integration)
        run: |
          mkdir -p .ci
          # exclude the internal/generator package from the broad test run so
          # it can be executed in an isolated job with a pinned toolchain.
          pkgs=$(go list ./... | grep -v "internal/generator" || true)
          if [ -z "$pkgs" ]; then
            echo "no packages to test"
          else
            go test $pkgs -v -coverprofile=.ci/coverage.out || true
          fi

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .ci/coverage.out

      - name: Run benchmarks (basic)
        run: go test -bench=. -run=^$ ./... || true

      - name: Run RequestID microbenchmark (pkg/flow)
        run: |
          mkdir -p .ci/bench
          # Run only the microbenchmarks for request id generators and save output
          go test ./pkg/flow -bench Benchmark -benchmem -run TestFastRequestIDFormat > .ci/bench/requestid_bench.txt || true

      - name: Upload requestid benchmark artifact
        uses: actions/upload-artifact@v4
        with:
          name: requestid-benchmark
          path: .ci/bench/requestid_bench.txt

  build-binaries:
    name: Build cross-platform binaries
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.24'

      - name: Prepare output dir
        run: mkdir -p release

      - name: Build linux/amd64 binary
        run: |
          GOOS=linux GOARCH=amd64 go build -o release/flow-linux-amd64 ./cmd/flow

      - name: Build linux/arm64 binary
        run: |
          GOOS=linux GOARCH=arm64 go build -o release/flow-linux-arm64 ./cmd/flow

      - name: Build windows/amd64 binary
        run: |
          GOOS=windows GOARCH=amd64 go build -o release/flow-windows-amd64.exe ./cmd/flow

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flow-binaries
          path: release/

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.24'

      - name: Run other integration tests (if any)
        run: |
          echo "No other integration tests configured; generator tests run in dedicated job."

  generator-compile:
    name: Generator compile tests (isolated)
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go (generator tests require Go 1.24)
        uses: actions/setup-go@v4
        with:
          go-version: '1.24'

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ${{ github.workspace }}/pkg/mod
          key: ${{ runner.OS }}-go-1.24-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.OS }}-go-1.24-

      - name: Install modules
        run: go mod download

      - name: Run generator CLI integration tests
        run: |
          mkdir -p .ci/integration
          # Run only the generator package tests which build and execute the CLI
          go test ./internal/generator -v 2>&1 | tee .ci/integration/generator_tests.txt

      - name: Upload generator integration artifact
        uses: actions/upload-artifact@v4
        with:
          name: generator-integration
          path: .ci/integration/generator_tests.txt
  # staticcheck moved to a dedicated workflow (`.github/workflows/staticcheck.yml`)
  # and now runs on pushes to `main`. Removing the inline `staticcheck` job
  # here avoids duplicate lint runs on push to `main` while keeping the
  # dedicated workflow for branch-level linting.
  test:
    name: Test (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: [1.22, 1.23, 1.24]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ matrix.go-version }}

      - name: Cache Go build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ matrix.go-version }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ matrix.go-version }}-

      - name: Print go env
        run: |
          go version
          go env

      - name: Install dependencies
        run: go mod download

      - name: Check formatting
        run: |
          set -e
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "Files need formatting:"; echo "$out"; exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Run tests (verbose)
        run: go test ./... -v

      - name: Run tests (no cache)
        run: go test ./... -count=1

