name: CI Improved

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  fast-check:
    name: Fast pre-merge checks (PR)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    strategy:
      matrix:
        go-version: [1.24]
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go (shared)
        uses: ./.github/actions/ci-setup
        with:
          go-version: ${{ matrix.go-version }}

      - name: Check gofmt
        run: |
          # Only check tracked Go files to avoid scanning local module cache
          out=$(git ls-files '*.go' | xargs -r gofmt -l)
          if [ -n "$out" ]; then
            echo "Files need formatting:"; echo "$out"; exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Run unit tests (fast)
        run: go test ./... -v -count=1

  full-ci:
    name: Full CI (merge & nightly)
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    strategy:
      matrix:
        go-version: [1.24, 1.25]
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go (shared)
        uses: ./.github/actions/ci-setup
        with:
          go-version: ${{ matrix.go-version }}
          gomodcache: ${{ github.workspace }}/.gomodcache
          goproxy: https://proxy.golang.org,direct
          gosumdb: sum.golang.org

      - name: Cache Go build/cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ${{ github.workspace }}/.gomodcache
          key: ${{ runner.OS }}-go-${{ matrix.go-version }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.OS }}-go-

      - name: Install dependencies
        run: go mod download

      - name: Check gofmt
        run: |
          # Only check tracked Go files to avoid scanning local module cache
          out=$(git ls-files '*.go' | xargs -r gofmt -l)
          if [ -n "$out" ]; then
            echo "Files need formatting:"; echo "$out"; exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Run golangci-lint (official action, pinned v2)
        uses: golangci/golangci-lint-action@v4
        with:
          # Pin to a golangci-lint v2 release to match .golangci.yml (version: "2").
          # Adjust this to a newer v2.x when you intentionally bump the linter.
          version: v2.9.0
          # Use the non-deprecated output format and a reasonable timeout.
          args: --out-format=colored-line-number --timeout=10m

      # staticcheck is now executed via golangci-lint (enabled in .golangci.yml).

      - name: Run tests (race + coverage)
        run: |
          mkdir -p .ci
          go test ./... -race -coverprofile=.ci/coverage.out -covermode=atomic || true

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .ci/coverage.out

      - name: Export CODECOV_TOKEN to env (if present)
        run: |
          # Export the secret to the job environment only when present so
          # subsequent `if: env.CODECOV_TOKEN` checks can be used without
          # referencing `secrets` directly in step-level `if` expressions.
          if [ -n "${{ secrets.CODECOV_TOKEN }}" ]; then
            echo "CODECOV_TOKEN=${{ secrets.CODECOV_TOKEN }}" >> $GITHUB_ENV
          fi

      - name: Upload coverage to Codecov (if token)
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v4
        with:
          files: .ci/coverage.out
          token: ${{ env.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Skip Codecov upload
        if: ${{ env.CODECOV_TOKEN == '' }}
        run: echo "CODECOV_TOKEN not set; skipping codecov upload"
