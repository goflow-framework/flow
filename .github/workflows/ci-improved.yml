name: CI Improved

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  fast-check:
    name: Fast pre-merge checks (PR)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    strategy:
      matrix:
        go-version: [1.24]
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go (shared)
        uses: ./.github/actions/ci-setup
        with:
          go-version: ${{ matrix.go-version }}

      - name: Check gofmt
        run: |
          # Only check tracked Go files to avoid scanning local module cache
          out=$(git ls-files '*.go' | xargs -r gofmt -l)
          if [ -n "$out" ]; then
            echo "Files need formatting:"; echo "$out"; exit 1
          fi

      - name: Run go vet
        run: go vet ./...
      - name: Install golangci-lint (fast)
        run: |
          # Install a pinned golangci-lint binary for fast PR checks.
          curl -sSfL https://github.com/golangci/golangci-lint/releases/download/v1.59.0/golangci-lint-1.59.0-linux-amd64.tar.gz -o /tmp/golangci.tar.gz
          tar -xzf /tmp/golangci.tar.gz -C $HOME

      - name: Run golangci-lint (fast)
        run: |
          # Disable the slow, type-aware linters during fast PR checks to
          # keep feedback quick; full CI will run the complete suite.
          $HOME/golangci-lint-1.59.0-linux-amd64/golangci-lint run --timeout=5m --disable=typecheck,staticcheck || true

      - name: Run unit tests (fast, excluding generator)
        run: |
          # Exclude the generator package tests which are run in a focused job.
          pkgs=$(go list ./... | grep -v "/internal/generator") || true
          if [ -n "$pkgs" ]; then
            echo "$pkgs" | xargs -r go test -v -count=1
          fi

  generator-tests:
    name: Generator tests (focused)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        go-version: [1.24]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go (shared)
        uses: ./.github/actions/ci-setup
        with:
          go-version: ${{ matrix.go-version }}
          gomodcache: ${{ github.workspace }}/.gomodcache
          goproxy: https://proxy.golang.org,direct
          gosumdb: sum.golang.org

      - name: Cache generator gomodcache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.gomodcache
          key: ${{ runner.OS }}-generator-gomodcache-${{ hashFiles('**/go.sum') }}

      - name: Run generator tests
        env:
          GOMODCACHE: ${{ github.workspace }}/.gomodcache
          GOFLAGS: -modcacherw
        run: |
          # Run only the generator package tests to validate generator helpers.
          go test ./internal/generator -v -count=1

  full-ci:
    name: Full CI (merge & nightly)
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    strategy:
      matrix:
        go-version: [1.24, 1.25]
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go (shared)
        uses: ./.github/actions/ci-setup
        with:
          go-version: ${{ matrix.go-version }}
          gomodcache: ${{ github.workspace }}/.gomodcache
          goproxy: https://proxy.golang.org,direct
          gosumdb: sum.golang.org

      - name: Cache Go build/cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ${{ github.workspace }}/.gomodcache
          key: ${{ runner.OS }}-go-${{ matrix.go-version }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.OS }}-go-

      - name: Install dependencies
        run: go mod download

      - name: Check gofmt
        run: |
          # Only check tracked Go files to avoid scanning local module cache
          out=$(git ls-files '*.go' | xargs -r gofmt -l)
          if [ -n "$out" ]; then
            echo "Files need formatting:"; echo "$out"; exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Install golangci-lint v2.9.0 (manual)
        run: |
          curl -sSfL https://github.com/golangci/golangci-lint/releases/download/v2.9.0/golangci-lint-2.9.0-linux-amd64.tar.gz -o /tmp/golangci.tar.gz
          tar -xzf /tmp/golangci.tar.gz -C $HOME
          ls -la $HOME/golangci-lint-2.9.0-linux-amd64

      - name: Run golangci-lint (manual run)
        run: |
          # Use the pinned binary and avoid passing --out-format which may
          # not be supported by certain builds. We only pass a timeout.
          $HOME/golangci-lint-2.9.0-linux-amd64/golangci-lint run --timeout=10m

      # staticcheck is now executed via golangci-lint (enabled in .golangci.yml).

      - name: Run tests (race + coverage)
        run: |
          mkdir -p .ci
          go test ./... -race -coverprofile=.ci/coverage.out -covermode=atomic || true

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          # Make artifact name unique per matrix job and per workflow run to avoid 409 Conflict
          name: coverage-report-${{ matrix.go-version }}-${{ github.run_id }}
          path: .ci/coverage.out

      - name: Upload coverage to Codecov (guarded)
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          if [ -n "$CODECOV_TOKEN" ]; then
            echo "Uploading coverage to Codecov"
            # Use the official bash uploader when token is present. Keep
            # `|| true` so the CI doesn't fail if the uploader exits non-zero.
            curl -s https://codecov.io/bash | bash -s -- -t "$CODECOV_TOKEN" -f .ci/coverage.out || true
          else
            echo "CODECOV_TOKEN not set; skipping codecov upload"
          fi
